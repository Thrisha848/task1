<!DOCTYPE html>
<html>
<head>
    <title>Quick Note App</title>

    <style>
        body{
            font-family:Arial;
            width:600px;
            margin:auto;
            margin-top:40px;
        }

        textarea{
            width:100%;
            height:100px;
        }

        button{
            padding:10px;
            margin-top:10px;
        }

        .note{
            border:1px solid gray;
            padding:10px;
            margin-top:10px;
        }
    </style>

</head>

<body>

<h2>Quick Note Application</h2>

<textarea id="noteInput" placeholder="Write a note"></textarea>

<br>

<button onclick="saveNote()">
Save Note
</button>

<h3>Saved Notes</h3>

<div id="notesContainer"></div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
